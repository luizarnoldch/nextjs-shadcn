services:
  minio:
    image: minio/minio:latest
    container_name: legaltech-minio
    ports:
      - '${MINIO_PORT}:9000' # S3 API
      - '${MINIO_CONSOLE_PORT}:9001' # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: http://${MINIO_SERVER_URL}:${MINIO_PORT}
      MINIO_BROWSER_REDIRECT_URL: http://${MINIO_BROWSER_REDIRECT_URL}:${MINIO_CONSOLE_PORT}
    command: server /data --console-address ":9001" --address ":9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint:
      [
        '/bin/sh',
        '-c',
        '/usr/bin/docker-entrypoint.sh minio server /data --console-address :9001',
      ]

volumes:
  minio_data:
